# FE-12 Nowcasting & Physics Engine Configuration

catalog_version: "1.0.0"
pipeline_version: "1.0.0"

solexs:
  detector_mode: "AUTO"
  detector_version: "1.0.0"
  buffer_size: 120
  ema_alpha: 0.02
  background_seed: 50.0
  monitoring_threshold: 1.2
  monitoring_persistence: 3
  rising_threshold: 1.5
  rising_persistence: 5
  active_threshold: 2.0
  peak_derivative_window: 3
  decay_drop_fraction: 0.20
  ended_threshold: 1.3
  derivative_window: 5
  rolling_avg_window: 5
  confidence_weight_peak_ratio: 0.35
  confidence_weight_persistence: 0.25
  confidence_weight_derivative: 0.20
  confidence_weight_quality: 0.20

helios:
  detector_mode: "AUTO"
  detector_version: "1.0.0"
  buffer_size: 60
  ema_alpha: 0.05
  background_seed: 10.0
  spike_sigma: 3.0
  rising_persistence: 2
  decay_sigma: 2.0
  ended_sigma: 1.0
  min_burst_duration_s: 2.0
  max_burst_duration_s: 300.0
  confidence_weight_sigma: 0.40
  confidence_weight_duration: 0.25
  confidence_weight_energy: 0.20
  confidence_weight_quality: 0.15

association:
  temporal_window_s: 120.0
  neupert_max_delay_s: 60.0
  association_threshold: 0.6
  ambiguous_threshold: 0.3
  weight_temporal_overlap: 0.40
  weight_neupert_timing: 0.35
  weight_flux_correlation: 0.25

simulation:
  solexs_quiet_flux: 30.0
  helios_quiet_flux: 8.0
  flare_probability_per_tick: 0.008
  flare_min_duration_s: 30
  flare_max_duration_s: 180
  flare_peak_multiplier_min: 3.0
  flare_peak_multiplier_max: 15.0
  helios_spike_delay_s: 0
  helios_burst_fraction: 0.3
  noise_std_fraction: 0.05

physics:
  thermal_enabled: true
  nonthermal_enabled: true
  spectral_enabled: true
  plasma_enabled: true
  neupert_enabled: true
  classification_enabled: true
  classification_goes_mapping_exponent_offset: 10.0
  classification_goes_mapping_exponent_scale: 2.0
  neupert_min_correlation: 0.5
